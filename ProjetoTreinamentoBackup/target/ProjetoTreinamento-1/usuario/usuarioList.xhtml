<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
<ui:composition template="../WEB-INF/template.xhtml">
    <ui:define name="content">
        <h:head>
            <style type="text/css">
                .ui-datatable .ui-datatable-data .row-inativo td {
                    background-color: #ff9999;
                }
            </style>
        </h:head>

        <h:body>
            <ui:include src="../mpProc.xhtml"/>
            <f:view>
                <h:form>
                    <p:panel header="Pesquisar Usuário">
                        <p:outputLabel value="Opções" />



                        <p:selectOneMenu id="menuOpcoes" value="#{usuarioFaces.optionsSearchSelected}">
                            <f:selectItems value="#{usuarioFaces.optionsSearchUsuario}"/>
                        </p:selectOneMenu>



                        <p:inputText value="#{usuarioFaces.txtUsuarioSearch}"/>



                        <p:commandButton value="Pesquisar" action="#{usuarioFaces.buscaUsuariosList}"
                                         update="dataTable"/>


                        <p:commandButton value="Novo" action="#{usuarioFaces.doAddUsuario()}" ajax="false"/>
                    </p:panel>

                    <p:dataTable id="dataTable" value="#{usuarioFaces.listUsuarios}"  var="item" rows="20"
                    paginator="true" paginatorPosition="bottom" emptyMessage="Não há registros!"
                    rowKey="#{item.usuCodigo}">

                        <p:column sortBy="#{item.usuCodigo}" headerText="Código"> <ui:remove>Usar #{item.usuCodigo} é o mesmo que apontar para o usuCodigo de um Usuario</ui:remove>
                            <h:outputLabel value="#{item.usuCodigo}"/>
                        </p:column>

                        <p:column sortB="#{item.usuNome}" headerText="Nome">
                            <h:outputText value="#{item.usuNome}">
                        </p:column>

                        <p:column headerText="">
                            <p:commandLink>
                                <f:setPropertyActionListener target="@previous" value="confirmacaoDialog"/>
                            </p:commandLink>
                        </p:column>






                    </p:dataTable>
                </h:form>



            </f:view>
        </h:body>
    </ui:define>
</ui:composition>
</html>
