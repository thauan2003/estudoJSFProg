<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui"
      xmlns:c="http://xmlns.jcp.org/jsp/jstl/core">
<ui:composition template="../WEB-INF/template.xhtml">
    <ui:define name="content">
        <h:head>
            <style type="text/css">
                .ui-datatable .ui-datatable-data .row-inativo td {
                    background-color: #ff9999;
                }
            </style>
        </h:head>

        <h:body>
            <ui:include src="../mpProc.xhtml"/>
            <f:view>
                <h:form id="form">
                    <p:growl id="growl" showDetail="true"/>
                    <p:remoteCommand name="buscaInicial" autoRun="true"
                                     onstart="PF('mpProc').show();"
                                     oncomplete="PF('mpProc').hide();document.getElementById('form:txtBusca').focus()"
                                     actionListener="#{usuarioFaces.buscaUsuariosList}" update="dataTable"/>
                    <p:focus for="txtBusca"/>
                    <table class="tbAlignCenter">
                        <tr>
                            <td align="center">
                                <p:panel header="Pesquisar Usuário">
                                    <table>
                                        <tr>
                                            <td align="left">
                                                <h:outputLabel value="Opções:"/>
                                                &nbsp;
                                                <p:selectOneMenu id="comboPesquisa" value="#{usuarioFaces.optionSearchSelected}"
                                                                 style="width: 30%"
                                                                 onchange="document.forms['form']['form:txtBusca'].focus()">
                                                    <f:selectItems value="#{usuarioFaces.optionsSearchUsuario}"/>
                                                </p:selectOneMenu>
                                            </td>
                                        </tr>
                                        <tr>
                                            <td align="left">
                                                <p:inputText id="txtBusca" value="#{usuarioFaces.txtUsuarioSearch}" style="text-transform: uppercase;" size="30"/>
                                                &nbsp;
                                                <p:commandButton icon="fa fa-search" value="Pesquisar"
                                                                 styleClass="btnMenor90"
                                                                 onstart="PF('mpProc').show();" oncomplete="PF('mpProc').hide();"
                                                                 actionListener="#{usuarioFaces.buscaUsuariosList}" update="dataTable"/>
                                            </td>
                                            <td align="center">
                                                <p:commandButton icon="fa fa-plus"
                                                                 styleClass="btnMenor90"
                                                                 value="Novo"
                                                                 action="#{usuarioFaces.doAddUsuario}" ajax="false"/>
                                            </td>
                                        </tr>
                                    </table>
                                </p:panel>
                            </td>
                        </tr>
                    </table>
                    <table align="center">
                        <tr>
                            <td align="center">
                                <p:dataTable id="dataTable"
                                             value="#{usuarioFaces.listUsuarios}"
                                             var="item"
                                             rows="20"
                                             tableStyle="table-layout: auto; min-width: 600px"
                                             paginator="true"
                                             selectionMode="sinlge"
                                             rowKey="#{item.usuCodigo}"
                                             paginatorPosition="bottom"
                                             emptyMessage="#{msg.NotFound}">

                                    <p:ajax event="rowSelect" listener="#{usuarioFaces.onRowSelect}"/>

                                    <p:column sortBy="#{item.usuCodigo}" headerText="Código" style="width: 100px">
                                        <h:outputLabel value="#{item.usuCodigo}"/>
                                    </p:column>

                                    <p:column sortBy="#{item.usuNome}" headerText="Nome">
                                        <h:outputText value="#{item.usuNome}"/>
                                    </p:column>

                                    <p:column style="width:40px; text-align: center" headerText="">
                                        <p:commandLink oncomplete="PF('excluir').show();">
                                            <i class="fa fa-trash-o" style="font-size: 17px; color: #e74b02"/>
                                            <f:setPropertyActionListener target="#{usuarioFaces.usuarioSelected}" value="#{item}"/>
                                        </p:commandLink>
                                    </p:column>

                                    <f:facet name="footer">
                                        <p:columnGroup>
                                            <p:column colspan="3">
                                                <h:outputLabel value="Total Reg. #{usuarioFaces.listUsuarios.size()}" style="font-size: 10px;font-family: Arial,Helvetica,sans-serif;font-weight: bold;"/>
                                            </p:column>
                                        </p:columnGroup>
                                    </f:facet>
                                </p:dataTable>
                            </td>
                        </tr>
                    </table>
                    <p:confirmDialog header="Confirma Exclusão?" id="excluir" message="Confirma Exclusão?" showEffect="fade" hideEffect="fade"
                                     severity="alert" widgetVar="excluir">
                        <p:commandButton value="Sim" actionListener="#{usuarioFaces.doRemoveUsuario}"
                                         update="growl" onclick="PF('excluir').hide();PF('mpProc').show();" oncomplete="buscaInicial();"/>
                        <p:commandButton value="Não" onclick="PF('excluir').hide()"/>
                    </p:confirmDialog>
                </h:form>
                <h:form>
                    <p:commandButton value="Imprimir"
                                     onclick="PF('mpProc').show()"
                                     oncomplete="PF('mpProc').hide();abrePopUpCenter(70,100,'#{utilFaces.contexto}/GenericPopupJasper')"
                                     actionListener="#{relatorios.profissional.imprimir}" >
                    </p:commandButton>
                </h:form>
            </f:view>
        </h:body>
    </ui:define>
</ui:composition>
</html>
