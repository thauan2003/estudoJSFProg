<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://java.sun.com/jsf/html"
      xmlns:f="http://java.sun.com/jsf/core"
      xmlns:ui="http://java.sun.com/jsf/facelets"
      xmlns:p="http://primefaces.org/ui">

    <h:head>
        <f:facet name="first">
            <meta http-equiv="X-UA-Compatible" content="IE=edge" />
            <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
            <meta name="apple-mobile-web-app-capable" content="yes" />
            <meta name="theme-color" content="#009688" />
        </f:facet>
<!--        <script type="text/javascript" src="#{utilFaces.contexto}/resources/ultima-layout/js/nanoscroller.js"></script>-->
        <script type="text/javascript" src="#{utilFaces.contexto}/resources/ultima-layout/js/layout.js"></script>
<!--        <script type="text/javascript" src="#{utilFaces.contexto}/resources/ultima-layout/js/ripple.js"></script>-->
<!--        <script type="text/javascript" src="#{utilFaces.contexto}/resources/ultima-layout/js/swipe.js"></script>-->
        <script type="text/javascript" src="#{utilFaces.contexto}/resources/js/funcoes.js"></script>
        <h:outputScript library="primefaces" name="hotkey/hotkey.js"/>
        <h:outputScript library="primefaces" name="jquery/jquery.js" target="head" />
        <h:outputStylesheet name="primeicons/primeicons.css" library="primefaces" />
        <h:outputScript target="head">
            $ = jQuery;
        </h:outputScript>
        <ui:insert name="head"/>
        <script>
            $(document).ready(function () {
                $(".ui-clock").css("display", "none");
                $(".ui-clock").on('DOMSubtreeModified', function () {
                    var value = $(this).text();
                    if (value !== '') {
                        $(".txtDataHoraServer").val(value);
                    }
                });

            });
        </script>
    </h:head>

    <h:body styleClass="main-body #{guestPreferences.compact ? 'layout-compact' : null}">
        <style>
            .ui-selectonemenu .ui-selectonemenu-trigger .ui-icon {
                position: absolute;
                margin: auto;
                top: auto !important;
                bottom: 0;
                left: 0;
                right: 0;
            }
        </style>
        <link rel="stylesheet" type="text/css" href="#{utilFaces.contexto}/resources/ultima-layout/css/layout-geral.css"/>
<!--        <link rel="stylesheet" type="text/css" href="#{utilFaces.contexto}/resources/ultima-layout/css/animate.css"/>-->
<!--        <link rel="stylesheet" type="text/css" href="#{utilFaces.contexto}/resources/ultima-layout/css/ripple.css"/>-->
<!--        <link rel="stylesheet" type="text/css" href="#{utilFaces.contexto}/resources/ultima-layout/css/layout-#{guestPreferences.theme}.css"/>-->
        <link rel="stylesheet" type="text/css" href="#{utilFaces.contexto}/resources/ultima-layout/css/nanoscroller.css"/>
    </h:body>

</html>
